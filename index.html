<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eptura Engage System-Check</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; color: #333; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <p>Prüfe Systemvoraussetzungen für <strong>Eptura Engage</strong>...</p>
        <p id="manual-link" style="display:none;">
            Falls Sie nicht automatisch weitergeleitet werden: <br>
            <a href="#" id="store-link">Hier klicken</a>
        </p>
    </div>

    <script>
        (function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /android/i.test(ua);
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

            const config = {
                appScheme: "condeco://", // Technisches Präfix der App
                playStore: "https://play.google.com/store/apps/details?id=com.condecosoftware.condeco",
                appStore: "https://apps.apple.com/app/eptura-engage/id1552591142"
            };

            let storeUrl = isAndroid ? config.playStore : (isIOS ? config.appStore : null);

            if (storeUrl) {
                // 1. Intent: App-Start versuchen
                window.location.href = config.appScheme;

                // 2. Fallback: Nach 2500ms Store öffnen, falls App nicht reagiert
                const start = Date.now();
                setTimeout(() => {
                    // Prüfen, ob der Nutzer die Seite noch sieht (Browser-Fokus)
                    // Wenn die App geöffnet wurde, verliert die Seite den Fokus
                    if (Date.now() - start < 3000) {
                        window.location.href = storeUrl;
                    }
                }, 2500);

                // UI-Redundanz bei Blockade durch Pop-up-Blocker
                document.getElementById('manual-link').style.display = 'block';
                document.getElementById('store-link').href = storeUrl;
            } else {
                document.body.innerHTML = "Bitte öffnen Sie diesen Link auf einem Mobilgerät.";
            }
        })();
    </script>
</body>
</html>
