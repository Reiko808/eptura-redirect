<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eptura Engage Access</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f9; text-align: center; }
        .container { padding: 20px; max-width: 400px; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #0056b3; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; transition: background 0.3s; border: none; cursor: pointer; }
        .spinner { border: 4px solid rgba(0,0,0,.1); border-left-color: #0056b3; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>Systemprüfung läuft...</p>
        </div>
        <div id="manual" style="display:none;">
            <p>Die App konnte nicht automatisch gestartet werden.</p>
            <button onclick="executeRedirect()" class="btn">App öffnen / Laden</button>
        </div>
    </div>

    <script>
        const config = {
            schemes: ["epturaengage://", "condeco://"],
            playStore: "https://play.google.com/store/apps/details?id=com.condecosoftware.condeco",
            appStore: "https://apps.apple.com/app/eptura-engage/id1565099537"
        };

        function executeRedirect() {
            const start = Date.now();
            const ua = navigator.userAgent || navigator.vendor;
            const isAndroid = /android/i.test(ua);
            const isIOS = /iPad|iPhone|iPod/.test(ua);
            const storeUrl = isAndroid ? config.playStore : (isIOS ? config.appStore : null);

            // Trigger Custom Schemes
            config.schemes.forEach(s => { window.location.href = s; });

            // Fallback nach 2.5s, falls Browser-Fokus erhalten bleibt (App nicht geöffnet)
            setTimeout(() => {
                if (Date.now() - start < 3000 && storeUrl) {
                    window.location.href = storeUrl;
                }
            }, 2500);
        }

        // Automatischer Erstversuch (Best Effort)
        window.onload = () => {
            executeRedirect();
            // Nach 3s Button einblenden, falls Redirect fehlschlug
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('manual').style.display = 'block';
            }, 3000);
        };
    </script>
</body>
</html>
